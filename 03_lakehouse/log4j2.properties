# GreenIoT-MA — log4j2 configuration for Spark local mode (Windows)
# Suppresses the cosmetic "Failed to delete temp dir" errors that occur
# during JVM shutdown due to Windows file locking on wildfly-openssl JAR.

rootLogger.level = warn
rootLogger.appenderRef.console.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5p %c{1}: %m%n

# ── Suppress shutdown-time temp dir cleanup errors (Windows JAR lock) ──
logger.shutdownhook.name  = org.apache.spark.util.ShutdownHookManager
logger.shutdownhook.level = off

logger.sparkenv.name  = org.apache.spark.SparkEnv
logger.sparkenv.level = off

# ── Suppress Hadoop S3A metrics config warning ──────────────────────
logger.metricsconfig.name  = org.apache.hadoop.metrics2.impl.MetricsConfig
logger.metricsconfig.level = error

# ── Keep useful Spark plan truncation warnings ───────────────────────
logger.sparkstring.name  = org.apache.spark.sql.catalyst.util.SparkStringUtils
logger.sparkstring.level = error
